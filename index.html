<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Conflictos Docentes G+H</title>
    <style>
        :root { --geo-blue: #1e40af; --hist-gold: #b45309; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .container { max-width: 400px; width: 100%; text-align: center; }

        /* Tarjeta */
        .card-container { perspective: 1000px; margin: 20px auto; cursor: pointer; }
        .card-inner {
            width: 320px; height: 520px; position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d; margin: 0 auto;
        }
        .is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            border: 6px solid #334155; overflow: hidden; background: white;
            display: flex; flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .card-back { background: var(--geo-blue); color: white; justify-content: center; align-items: center; }
        .card-front { transform: rotateY(180deg); border-color: var(--hist-gold); }

        .card-img { width: 100%; height: 240px; object-fit: cover; background: #eee; }
        .card-body { padding: 18px; text-align: left; display: flex; flex-direction: column; flex-grow: 1; }
        .badge { font-size: 0.7rem; font-weight: bold; padding: 4px 10px; border-radius: 6px; background: #e2e8f0; color: #1e40af; align-self: flex-start; margin-bottom: 12px; text-transform: uppercase; }
        .conflict-text { font-size: 1rem; line-height: 1.5; color: #1e293b; font-weight: 600; margin: 0; flex-grow: 1; }
        .footer { margin-top: auto; font-size: 0.75rem; color: #64748b; font-style: italic; border-top: 1px solid #eee; padding-top: 8px; }

        button { background: var(--hist-gold); color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button:hover { background: #8c4007; transform: translateY(-2px); }
        
        .counter { margin-top: 15px; font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--geo-blue); margin-bottom: 5px;">📍 Simulador G&H</h2>
    <p style="margin-top: 0; color: #64748b; font-size: 0.9rem;">Mazo de 16 situaciones docentes (Geografía e Historia)</p>

    <div class="card-container" onclick="flipCard()">
        <div class="card-inner" id="card-inner">
            <div class="card-face card-back">
                <div style="font-size: 5rem;">🧭</div>
                <p>Toca para revelar el dilema</p>
            </div>
            <div class="card-face card-front" id="card-content">
                </div>
        </div>
    </div>

    <button onclick="drawCard()">🎲 SIGUIENTE CONFLICTO</button>
    <div class="counter">Un mazo completo para el debate pedagógico</div>
</div>

<script>
    // Unificando los 16 conflictos (anteriores + nuevos sobre metodologías activas)
    const conflicts = [
        // 1-6 Situaciones anteriores (asociación imagen-pregunta directa)
        { cat: "PADRES vs INNOVACIÓN", text: "Un grupo de padres denuncia que 'adoctrinas' al explicar la represión en la dictadura. Exigen neutralidad absoluta en Historia.", img: "https://images.unsplash.com/photo-1576267423445-b2e0074d68a4?auto=format&fit=crop&w=500" },
        { cat: "CONFLICTO DEPARTAMENTO", text: "En la reunión de departamento, un profesor veterano critica tus Situaciones de Aprendizaje: dice que 'dibujar mapas no es estudiar'.", img: "https://images.unsplash.com/photo-1524178232363-1fb2b075b655?auto=format&fit=crop&w=500" },
        { cat: "GESTIÓN DE AULA", text: "Durante un debate de Geografía Humana, un alumno usa discursos de odio detectados en redes sociales. El resto del aula se bloquea.", img: "https://images.unsplash.com/photo-1427504494785-3a9ca7044f45?auto=format&fit=crop&w=500" },
        { cat: "METODOLOGÍA ACTIVA", text: "La jefa de estudios te pide que reduzcas el trabajo cooperativo porque el ruido molesta a la clase de latín de al lado.", img: "https://images.unsplash.com/photo-1511632765486-a01980e01a18?auto=format&fit=crop&w=500" },
        { cat: "EVALUACIÓN LOMLOE", text: "Los padres se quejan de que no haces exámenes de 10 preguntas. No entienden las rúbricas de tus proyectos de investigación.", img: "https://images.unsplash.com/photo-1454165833767-027ffea9e77b?auto=format&fit=crop&w=500" },
        { cat: "DIVERSIDAD en ABP", text: "El alumnado de alto rendimiento se queja de que el ABP de Historia Medieval les obliga a trabajar con alumnos 'más lentos'.", img: "https://images.unsplash.com/photo-1529070538774-1843cb3265df?auto=format&fit=crop&w=500" },
        
        // 7-16 Nuevas situaciones (enfoque didáctica y gestión)
        { cat: "DIDÁCTICA G&H", text: "Un alumno cuestiona por qué debe estudiar el arte del Renacimiento si 'está en Google'. Se niega a realizar el análisis iconográfico.", img: "https://images.unsplash.com/photo-1547826039-bfc35e0f1ea8?auto=format&fit=crop&w=500" },
        { cat: "TICs en Urbanismo", text: "Al usar Google Earth para una práctica de urbanismo, detectas que varios alumnos están jugando a minijuegos en otra pestaña.", img: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=500" },
        { cat: "EVALUACIÓN INCLUSIVA", text: "Un alumno con una adaptación curricular no significativa saca mejor nota que el 'brillante' del grupo. El alumno brillante reclama injusticia.", img: "https://images.unsplash.com/photo-1586281380117-5a60ae2050cc?auto=format&fit=crop&w=500" },
        { cat: "DIDÁCTICA G&H", text: "Planteas un juego de rol sobre la Revolución Francesa y la clase se descontrola: algunos alumnos empiezan a simular ejecuciones violentas.", img: "https://images.unsplash.com/photo-1533134486753-c833f0ed4866?auto=format&fit=crop&w=500" },
        { cat: "FAMILIAS y SA", text: "Un padre te escribe por iPasen exigiendo que le envíes por PDF todos los apuntes porque su hija no sabe qué estudiar de la Situación de Aprendizaje.", img: "https://images.unsplash.com/photo-1512486130939-2c4f79935e4f?auto=format&fit=crop&w=500" },
        { cat: "INCLUSIÓN vs GRUPO", text: "Tienes un alumno con TEA que se angustia con el ruido del trabajo cooperativo. El resto del grupo se siente limitado por tener que estar en silencio.", img: "https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9?auto=format&fit=crop&w=500" },
        { cat: "PATRIMONIO y SEGURIDAD", text: "Durante una salida al centro histórico, un grupo de alumnos se separa para ir a comprar comida sin permiso, rompiendo el protocolo de seguridad.", img: "https://images.unsplash.com/photo-1467269204594-9661b134dd2b?auto=format&fit=crop&w=500" },
        { cat: "ÉTICA DOCENTE", text: "Un compañero te sugiere 'inflar' las notas de 2º de Bachillerato para que el centro no pierda prestigio en la PEvAU.", img: "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?auto=format&fit=crop&w=500" },
        { cat: "RECURSOS BLOCKED", text: "El centro tiene bloqueado YouTube y no puedes proyectar el documental que era la base de tu sesión sobre el Imperialismo.", img: "https://images.unsplash.com/photo-1594322436404-5a0526db4d13?auto=format&fit=crop&w=500" },
        { cat: "CLIMA DE AULA", text: "Después de un examen difícil, circula un meme sobre ti en el grupo de WhatsApp de la clase y un alumno te lo muestra.", img: "https://images.unsplash.com/photo-1551817958-c5b5d1b75a2f?auto=format&fit=crop&w=500" }
    ];

    function drawCard() {
        const inner = document.getElementById('card-inner');
        const content = document.getElementById('card-content');
        
        // Quitar la vuelta para mostrar el reverso mientras cargamos
        inner.classList.remove('is-flipped');
        
        setTimeout(() => {
            const card = conflicts[Math.floor(Math.random() * conflicts.length)];
            content.innerHTML = `
                <img src="${card.img}" class="card-img" alt="Situación">
                <div class="card-body">
                    <span class="badge">${card.cat}</span>
                    <p class="conflict-text">"${card.text}"</p>
                    <div class="footer">¿Cómo actuarías profesionalmente?</div>
                </div>
            `;
            inner.classList.add('is-flipped');
        }, 300);
    }

    function flipCard() {
        document.getElementById('card-inner').classList.toggle('is-flipped');
    }

    // Iniciar con la primera carta
    window.onload = drawCard;
</script>

</body>
</html>

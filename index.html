<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador G+H: Dilemas Críticos</title>
    <style>
        :root { --geo-blue: #1e40af; --hist-gold: #b45309; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { max-width: 400px; width: 100%; text-align: center; }

        /* Tarjeta */
        .card-container { perspective: 1000px; margin: 20px auto; cursor: pointer; }
        .card-inner {
            width: 320px; height: 530px; position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d; margin: 0 auto;
        }
        .is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            border: 6px solid #334155; overflow: hidden; background: white;
            display: flex; flex-direction: column; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .card-back { background: var(--geo-blue); color: white; justify-content: center; align-items: center; }
        .card-front { transform: rotateY(180deg); border-color: var(--hist-gold); }

        .card-img { width: 100%; height: 230px; object-fit: cover; }
        .card-body { padding: 18px; text-align: left; display: flex; flex-direction: column; flex-grow: 1; }
        .badge { font-size: 0.7rem; font-weight: bold; padding: 4px 10px; border-radius: 6px; background: #fee2e2; color: #991b1b; align-self: flex-start; margin-bottom: 10px; text-transform: uppercase; }
        .conflict-text { font-size: 0.95rem; line-height: 1.4; color: #1e293b; font-weight: 600; margin: 0; flex-grow: 1; }
        .footer { margin-top: auto; font-size: 0.7rem; color: #64748b; font-style: italic; border-top: 1px solid #eee; padding-top: 8px; }

        button { background: var(--hist-gold); color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .counter-box { margin-top: 15px; font-size: 0.85rem; color: #475569; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--geo-blue); margin-bottom: 5px;">📍 Dilemas Éticos G&H</h2>
    <div class="counter-box">Cartas restantes: <span id="cards-left">0</span></div>

    <div class="card-container" onclick="flipCard()">
        <div class="card-inner" id="card-inner">
            <div class="card-face card-back">
                <div style="font-size: 4rem;">⚖️</div>
                <p>Revelar nuevo dilema</p>
            </div>
            <div class="card-face card-front" id="card-content"></div>
        </div>
    </div>

    <button onclick="drawCard()">🎲 SIGUIENTE CARTA (SIN REPETIR)</button>
</div>

<script>
    const masterDeck = [
        // --- ÉTICA Y EVALUACIÓN CRÍTICA (NUEVAS) ---
        { cat: "ÉTICA PROFESIONAL", text: "Un alumno confiesa en una actividad de 'Historia Oral' una situación de maltrato familiar. ¿Cómo equilibras el deber de sigilo con el protocolo de protección?", img: "https://images.unsplash.com/photo-1573497620053-ea5310f94f17?auto=format&fit=crop&w=500" },
        { cat: "EVALUACIÓN LOMLOE", text: "Un alumno suspende el examen de contenidos pero supera los criterios de evaluación mediante el producto final del ABP. ¿Qué prima en su nota final?", img: "https://images.unsplash.com/photo-1454165833767-027ffea9e77b?auto=format&fit=crop&w=500" },
        { cat: "SESGO IDEOLÓGICO", text: "Al explicar el colonialismo, un grupo de alumnos te acusa de ser 'anti-occidental'. Los padres elevan una queja a inspección por falta de objetividad.", img: "https://images.unsplash.com/photo-1526367790999-0150786686a2?auto=format&fit=crop&w=500" },
        { cat: "PLAGIO E IA", text: "Detectas que el 80% de un ensayo sobre la Revolución Industrial ha sido generado por IA. El alumno defiende que 'saber dar el prompt' es una competencia válida.", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&w=500" },
        { cat: "EVALUACIÓN DE PARES", text: "En una co-evaluación, los alumnos 'se ponen dieces' entre amigos y castigan a los compañeros con los que se llevan mal. ¿Cómo validas esa nota?", img: "https://images.unsplash.com/photo-1529156069898-49953e39b3ac?auto=format&fit=crop&w=500" },
        { cat: "DIVERSIDAD CULTURAL", text: "Un alumno de origen extranjero se siente ofendido por cómo el libro de texto relata la Reconquista. Se genera un clima de tensión identitaria en el aula.", img: "https://images.unsplash.com/photo-1521791136364-798a7bc0d26e?auto=format&fit=crop&w=500" },
        { cat: "IDENTIDAD PROFESIONAL", text: "Un compañero te dice que las Metodologías Activas son una 'estafa pedagógica' para bajar el nivel y que tú estás engañando a los alumnos.", img: "https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&w=500" },
        { cat: "USO DE FUENTES", text: "Llevas a clase una fuente primaria polémica sobre la Guerra Civil. Un alumno graba la sesión y la sube a redes sociales fuera de contexto.", img: "https://images.unsplash.com/photo-1516251193007-45ef944ab0c6?auto=format&fit=crop&w=500" },
        { cat: "MEMORIA DEMOCRÁTICA", text: "La dirección te sugiere 'pasar de puntillas' por temas de memoria histórica para evitar conflictos con familias influyentes del centro.", img: "https://images.unsplash.com/photo-1505664194779-8beaceb93744?auto=format&fit=crop&w=500" },
        { cat: "CALIFICACIÓN ÉTICA", text: "Un alumno con comportamiento ejemplar y esfuerzo máximo no llega a los mínimos curriculares. El equipo docente te presiona para que le apruebes por 'actitud'.", img: "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=500" },
        
        // --- CASOS ANTERIORES (SE MANTIENEN) ---
        { cat: "PADRES", text: "Se quejan de que en Historia no usan libro de texto, sino Situaciones de Aprendizaje. Dicen que así 'no estudian'.", img: "https://images.unsplash.com/photo-1576267423445-b2e0074d68a4?auto=format&fit=crop&w=500" },
        { cat: "COLEGAS", text: "Un veterano critica tus SA: dice que 'dibujar mapas no es estudiar'.", img: "https://images.unsplash.com/photo-1524178232363-1fb2b075b655?auto=format&fit=crop&w=500" },
        { cat: "ODIO", text: "En un debate sobre Geografía Humana, un alumno usa discursos de odio detectados en redes sociales.", img: "https://images.unsplash.com/photo-1427504494785-3a9ca7044f45?auto=format&fit=crop&w=500" }
    ];

    let currentDeck = [...masterDeck];

    function drawCard() {
        const inner = document.getElementById('card-inner');
        const content = document.getElementById('card-content');
        
        if (currentDeck.length === 0) {
            alert("¡Se han agotado todas las cartas! El mazo se reiniciará.");
            currentDeck = [...masterDeck];
        }

        inner.classList.remove('is-flipped');
        
        setTimeout(() => {
            const randomIndex = Math.floor(Math.random() * currentDeck.length);
            const card = currentDeck.splice(randomIndex, 1)[0]; // Saca la carta y la elimina del mazo actual

            content.innerHTML = `
                <img src="${card.img}" class="card-img" alt="Situación">
                <div class="card-body">
                    <span class="badge">${card.cat}</span>
                    <p class="conflict-text">"${card.text}"</p>
                    <div class="footer">Debate: Ética y Normativa LOMLOE</div>
                </div>
            `;
            inner.classList.add('is-flipped');
            document.getElementById('cards-left').innerText = currentDeck.length;
        }, 300);
    }

    function flipCard() { document.getElementById('card-inner').classList.toggle('is-flipped'); }

    window.onload = () => { document.getElementById('cards-left').innerText = currentDeck.length; drawCard(); };
</script>
</body>
</html>
